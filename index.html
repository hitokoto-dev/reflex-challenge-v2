<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ リフレックス・チャレンジ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a1a;
    --card: #151530;
    --accent: #ff6b35;
    --accent2: #00e5ff;
    --success: #00e676;
    --fail: #ff1744;
    --text: #ffffff;
    --dim: #8888aa;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 20px; }
  .screen.active { display: flex; }

  /* Title Screen */
  #title-screen { gap: 20px; background: radial-gradient(ellipse at center, #1a1a3a 0%, var(--bg) 70%); }
  .game-logo { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; line-height: 1.2; }
  .game-subtitle { color: var(--dim); font-size: clamp(0.9rem, 2.5vw, 1.2rem); text-align: center; margin-bottom: 10px; }

  .btn {
    padding: 16px 48px; font-size: 1.3rem; font-weight: 700;
    border: none; border-radius: 60px; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #ff8a50); color: #fff; box-shadow: 0 4px 20px rgba(255,107,53,0.4); }
  .btn-secondary { background: transparent; color: var(--accent2); border: 2px solid var(--accent2); padding: 12px 36px; font-size: 1rem; }

  .best-score-display { color: var(--accent2); font-size: 1rem; margin-top: 8px; }

  /* Sound toggle */
  .sound-toggle {
    position: fixed; top: 12px; right: 12px; z-index: 200;
    background: var(--card); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); font-size: 1.4rem; width: 44px; height: 44px;
    border-radius: 50%; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .sound-toggle:active { transform: scale(0.9); }

  /* Countdown */
  #countdown-screen { background: var(--bg); }
  .countdown-number {
    font-size: clamp(8rem, 30vw, 16rem); font-weight: 900;
    animation: countPulse 0.6s ease-out;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  @keyframes countPulse {
    0% { transform: scale(2); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Game Screen */
  #game-screen { padding: 0; position: relative; background: var(--bg); }

  .game-hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; background: rgba(0,0,0,0.5);
    z-index: 10; font-size: clamp(0.85rem, 2vw, 1rem);
  }
  .hud-score { color: var(--accent); font-weight: 700; }
  .hud-combo { color: var(--accent2); font-weight: 700; }
  .hud-timer { color: var(--text); font-weight: 700; }

  .timer-bar {
    position: absolute; top: 48px; left: 0; right: 0; height: 4px;
    background: rgba(255,255,255,0.1); z-index: 10;
  }
  .timer-bar-fill { height: 100%; background: var(--accent2); transition: width 0.05s linear; }

  .question-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 56px 16px 8px; width: 100%;
  }

  .question-label {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--dim); margin-bottom: 4px;
  }
  .question-text {
    font-size: clamp(1.3rem, 4.5vw, 2.5rem);
    font-weight: 900; text-align: center;
    margin-bottom: 12px; line-height: 1.3;
    min-height: 60px; display: flex;
    align-items: center; justify-content: center;
  }
  .emoji-display {
    font-size: clamp(2.5rem, 10vw, 5rem);
    margin-bottom: 8px; min-height: 60px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* ===== Cross-shaped 4-choice layout ===== */
  .choices-cross {
    display: grid;
    grid-template-areas:
      ".  up  ."
      "left center right"
      ".  down .";
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 6px;
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1;
  }

  .choice-btn {
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    background: var(--card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    cursor: pointer; transition: all 0.12s;
    position: relative; gap: 2px;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-btn .choice-label {
    font-size: clamp(0.6rem, 1.5vw, 0.8rem);
    color: var(--dim); font-weight: 700;
  }
  .choice-btn:active { transform: scale(0.9); }

  .choice-btn[data-dir="up"]    { grid-area: up;    border-color: rgba(0, 229, 255, 0.4); }
  .choice-btn[data-dir="down"]  { grid-area: down;  border-color: rgba(255, 107, 53, 0.4); }
  .choice-btn[data-dir="left"]  { grid-area: left;  border-color: rgba(0, 230, 118, 0.4); }
  .choice-btn[data-dir="right"] { grid-area: right; border-color: rgba(255, 235, 59, 0.4); }

  .choice-btn.correct { background: var(--success) !important; border-color: var(--success) !important; }
  .choice-btn.wrong   { background: var(--fail) !important; border-color: var(--fail) !important; }

  /* Flash overlay */
  .flash-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 100;
    animation: flash 0.3s ease-out forwards;
  }
  .flash-correct { background: rgba(0, 230, 118, 0.25); }
  .flash-wrong   { background: rgba(255, 23, 68, 0.4); }
  @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* Combo popup */
  .combo-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(2rem, 8vw, 4rem); font-weight: 900;
    pointer-events: none; z-index: 50;
    animation: comboAnim 0.8s ease-out forwards;
    color: var(--accent2); text-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
  }
  @keyframes comboAnim {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    30%  { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -80%) scale(1); opacity: 0; }
  }

  /* Result Screen */
  #result-screen { gap: 14px; background: radial-gradient(ellipse at center, #1a1a3a 0%, var(--bg) 70%); }
  .result-label { font-size: 1.2rem; color: var(--dim); }
  .result-score {
    font-size: clamp(4rem, 15vw, 8rem); font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .result-stats { text-align: center; color: var(--dim); line-height: 2; font-size: 1rem; }
  .result-new-record { color: var(--accent); font-weight: 700; font-size: 1.2rem; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Ranking Screen */
  #ranking-screen { gap: 16px; padding: 20px; overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
  .ranking-title { font-size: 1.8rem; font-weight: 900; color: var(--accent2); margin-bottom: 8px; }
  .ranking-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .ranking-tab {
    padding: 8px 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.15);
    background: transparent; color: var(--dim); font-weight: 700;
    cursor: pointer; font-family: inherit; font-size: 0.9rem;
  }
  .ranking-tab.active { background: var(--accent2); color: #000; border-color: var(--accent2); }
  .ranking-list { width: 100%; max-width: 400px; }
  .ranking-item {
    display: flex; align-items: center; padding: 14px 16px;
    background: var(--card); border-radius: 12px; margin-bottom: 8px; gap: 12px;
  }
  .rank-num { font-size: 1.4rem; font-weight: 900; min-width: 40px; text-align: center; }
  .rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
  .rank-name { flex: 1; font-weight: 700; }
  .rank-score { color: var(--accent2); font-weight: 700; font-size: 1.1rem; }
  .rank-date { color: var(--dim); font-size: 0.75rem; }
  .ranking-loading { text-align: center; color: var(--dim); padding: 40px; }
  .ranking-loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--dim); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .save-status { font-size: 0.85rem; margin-top: 4px; min-height: 20px; }

  .name-input-area { display: flex; gap: 8px; margin-top: 8px; width: 100%; max-width: 300px; }
  .name-input-area input {
    flex: 1; padding: 12px 16px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2); background: var(--card);
    color: var(--text); font-size: 1rem; font-family: inherit; outline: none;
  }
  .name-input-area input:focus { border-color: var(--accent2); }

  .kb-hint { color: var(--dim); font-size: 0.8rem; margin-top: 12px; }

  .arrow-display { font-size: clamp(5rem, 18vw, 10rem); animation: arrowIn 0.2s ease-out; }
  @keyframes arrowIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .speed-label {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%); color: var(--dim); font-size: 0.75rem;
  }

.btn-x-share {
  background: #000; color: #fff; border: 2px solid #555;
  padding: 14px 32px; font-size: 1.1rem; font-weight: 700;
  border-radius: 60px; cursor: pointer; font-family: inherit;
  transition: all 0.2s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-x-share:hover { background: #1a1a1a; border-color: #fff; }
.btn-x-share:active { transform: scale(0.95); }
.x-share-hint { color: var(--dim); font-size: 0.8rem; margin-top: 2px; }

    .name-input-area { max-width: min(300px, calc(100vw - 40px)); }
    .name-input-area input { min-width: 0; }
    .name-input-area .btn { padding: 10px 16px; font-size: 0.9rem; flex: none; }
    </style>
</head>
<body>

<!-- Sound Toggle -->
<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">🔊</button>

<!-- Title Screen -->
<div id="title-screen" class="screen active">
  <div class="game-logo">⚡ リフレックス<br>チャレンジ</div>
  <div class="game-subtitle">4方向 × 反射神経 × 連続クイズ</div>
  <button class="btn btn-primary" onclick="startGame()">スタート</button>
  <button class="btn btn-secondary" onclick="showRanking()">🏆 ランキング</button>
  <div class="best-score-display" id="best-score-display"></div>
  <div class="kb-hint">🖥️ キーボード: 矢印キー / WASD</div>
</div>

<!-- Countdown Screen -->
<div id="countdown-screen" class="screen">
  <div class="countdown-number" id="countdown-num">3</div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div class="game-hud">
    <div class="hud-score">スコア: <span id="hud-score">0</span></div>
    <div class="hud-combo" id="hud-combo"></div>
    <div class="hud-timer">⏱ <span id="hud-timer">0.0</span>s</div>
  </div>
  <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill"></div></div>

  <div class="question-area">
    <div class="question-label" id="q-label"></div>
    <div class="emoji-display" id="q-emoji"></div>
    <div class="question-text" id="q-text"></div>
    <div class="choices-cross" id="choices-grid">
      <div class="choice-btn" data-dir="up" id="btn-up">
        <span class="choice-content"></span><span class="choice-label">▲ 上</span>
      </div>
      <div class="choice-btn" data-dir="left" id="btn-left">
        <span class="choice-content"></span><span class="choice-label">◀ 左</span>
      </div>
      <div class="choice-btn" data-dir="right" id="btn-right">
        <span class="choice-content"></span><span class="choice-label">右 ▶</span>
      </div>
      <div class="choice-btn" data-dir="down" id="btn-down">
        <span class="choice-content"></span><span class="choice-label">▼ 下</span>
      </div>
    </div>
  </div>
  <div class="speed-label" id="speed-label"></div>
</div>

<!-- Result Screen -->
<div id="result-screen" class="screen">
  <div class="result-label">スコア</div>
  <div class="result-score" id="result-score">0</div>
  <div id="result-new-record" class="result-new-record" style="display:none">🎉 NEW RECORD!</div>
  <div class="result-stats" id="result-stats"></div>
  <div class="name-input-area" id="name-input-area">
    <input type="text" id="player-name" placeholder="名前を入力" maxlength="10">
    <button class="btn btn-primary" style="padding:12px 24px;font-size:1rem" id="save-btn" onclick="saveScore()">保存</button>
  </div>
  <div class="save-status" id="save-status"></div>
            <button class="btn btn-x-share" id="x-share-btn" onclick="shareOnX()">𝕏 でスコアをシェア！</button>
            <div class="x-share-hint" id="x-share-hint">フレンドに自慢しよう！</div>
  <button class="btn btn-primary" onclick="startGame()" style="margin-top:8px">もう一回</button>
  <button class="btn btn-secondary" onclick="showRanking()">🏆 ランキング</button>
  <button class="btn btn-secondary" onclick="showTitle()">タイトルへ</button>
</div>

<!-- Ranking Screen -->
<div id="ranking-screen" class="screen">
  <div class="ranking-title">🏆 ランキング</div>
  <div class="ranking-tabs">
    <button class="ranking-tab active" id="tab-global" onclick="switchRankingTab('global')">🌍 全員</button>
    <button class="ranking-tab" id="tab-local" onclick="switchRankingTab('local')">📱 自分</button>
  </div>
  <div class="ranking-list" id="ranking-list"></div>
  <button class="btn btn-secondary" onclick="showTitle()" style="margin-top:16px">戻る</button>
</div>

<script>
// ========================================
// AUDIO ENGINE (Web Audio API)
// ========================================
let audioCtx = null;
let soundEnabled = true;
let bgmGain = null;
let bgmOscillators = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) stopBGM();
}

// --- SE ---
function playSE(type) {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;

  if (type === 'correct') {
    // Bright ascending chime
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.linearRampToValueAtTime(880, now + 0.08);
    osc.frequency.linearRampToValueAtTime(1100, now + 0.15);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.25);

    // Harmony
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(880, now + 0.03);
    osc2.frequency.linearRampToValueAtTime(1320, now + 0.15);
    gain2.gain.setValueAtTime(0.12, now + 0.03);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now + 0.03); osc2.stop(now + 0.3);
  }

  else if (type === 'wrong') {
    // Buzzer / descending
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.linearRampToValueAtTime(100, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.35);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(180, now);
    osc2.frequency.linearRampToValueAtTime(80, now + 0.25);
    gain2.gain.setValueAtTime(0.08, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now); osc2.stop(now + 0.3);
  }

  else if (type === 'countdown') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.2);
  }

  else if (type === 'go') {
    // GO! fanfare
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.06);
      gain.gain.setValueAtTime(0.2, now + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.3);
    });
  }

  else if (type === 'combo') {
    // Sparkle
    [1200, 1500, 1800].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.05);
      gain.gain.setValueAtTime(0.12, now + i * 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.05); osc.stop(now + i * 0.05 + 0.2);
    });
  }

  else if (type === 'newrecord') {
    // Celebration fanfare
    const melody = [523, 659, 784, 1047, 784, 1047, 1319];
    melody.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, now + i * 0.1);
      gain.gain.setValueAtTime(0.18, now + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.25);
    });
  }

  else if (type === 'click') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.06);
  }
}

// --- BGM (looping generative beat) ---
function startBGM() {
  if (!soundEnabled || !audioCtx) return;
  stopBGM();

  bgmGain = audioCtx.createGain();
  bgmGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  bgmGain.connect(audioCtx.destination);

  // Bass pulse
  const bass = audioCtx.createOscillator();
  bass.type = 'sine';
  bass.frequency.setValueAtTime(80, audioCtx.currentTime);
  const bassGain = audioCtx.createGain();
  bassGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
  bass.connect(bassGain).connect(bgmGain);
  bass.start();
  bgmOscillators.push(bass);

  // Pulse modulation for rhythm
  const lfo = audioCtx.createOscillator();
  lfo.type = 'square';
  lfo.frequency.setValueAtTime(3, audioCtx.currentTime);
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  lfo.connect(lfoGain).connect(bassGain.gain);
  lfo.start();
  bgmOscillators.push(lfo);

  // High pad
  const pad = audioCtx.createOscillator();
  pad.type = 'triangle';
  pad.frequency.setValueAtTime(220, audioCtx.currentTime);
  const padGain = audioCtx.createGain();
  padGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  pad.connect(padGain).connect(bgmGain);
  pad.start();
  bgmOscillators.push(pad);

  // Slow detune for movement
  const lfo2 = audioCtx.createOscillator();
  lfo2.type = 'sine';
  lfo2.frequency.setValueAtTime(0.5, audioCtx.currentTime);
  const lfo2Gain = audioCtx.createGain();
  lfo2Gain.gain.setValueAtTime(8, audioCtx.currentTime);
  lfo2.connect(lfo2Gain).connect(pad.frequency);
  lfo2.start();
  bgmOscillators.push(lfo2);
}

function stopBGM() {
  bgmOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
  bgmOscillators = [];
  bgmGain = null;
}

function setBGMIntensity(level) {
  // level 0-1, ramps BGM intensity
  if (!bgmGain || !audioCtx) return;
  const vol = 0.04 + level * 0.06;
  bgmGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.1);
}

function startGame() {
  initAudio();
  score = 0; combo = 0; maxCombo = 0; correct = 0; total = 0;
  totalReactionTime = 0;
  baseTime = 4000;
  gameActive = false;
  showScreen('countdown-screen');
  doCountdown(3);
}

function doCountdown(n) {
  if (n <= 0) {
    playSE('go');
    gameActive = true;
    showScreen('game-screen');
    startBGM();
    nextQuestion();
    return;
  }
  const el = document.getElementById('countdown-num');
  el.textContent = n;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'countPulse 0.6s ease-out';
  playSE('countdown');
  setTimeout(() => doCountdown(n - 1), 800);
}

function getTimeLimit() {
  const minTime = 1500;
  const decayPerQ = 80;
  return Math.max(minTime, baseTime - total * decayPerQ);
}

function nextQuestion() {
  if (!gameActive) return;

  let typeIdx;
  do {
    typeIdx = Math.floor(Math.random() * questionGenerators.length);
  } while (typeIdx === lastQuestionType && questionGenerators.length > 1);
  lastQuestionType = typeIdx;

  const q = questionGenerators[typeIdx]();
  currentAnswer = q.answer;
  startTime = performance.now();

  // Update BGM intensity based on progress
  setBGMIntensity(Math.min(1, total / 20));

  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').innerHTML = q.text;
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-combo').textContent = combo > 1 ? `🔥 ${combo}コンボ` : '';

  const positions = ['up', 'right', 'left', 'down'];
  positions.forEach(pos => {
    const btn = document.getElementById('btn-' + pos);
    btn.querySelector('.choice-content').textContent = q.choices[pos];
    btn.classList.remove('correct', 'wrong');
  });

  timeLeft = getTimeLimit();
  const totalTime = timeLeft;
  clearInterval(timerInterval);
  clearTimeout(questionTimeout);

  const timerFill = document.getElementById('timer-bar-fill');
  timerFill.style.width = '100%';

  timerInterval = setInterval(() => {
    timeLeft -= 50;
    const pct = Math.max(0, timeLeft / totalTime * 100);
    timerFill.style.width = pct + '%';
    document.getElementById('hud-timer').textContent = (timeLeft / 1000).toFixed(1);
    if (pct < 30) timerFill.style.background = 'var(--fail)';
    else if (pct < 60) timerFill.style.background = 'var(--accent)';
    else timerFill.style.background = 'var(--accent2)';
  }, 50);

  questionTimeout = setTimeout(() => onTimeout(), timeLeft);

  const limit = getTimeLimit();
  if (limit <= 1800) document.getElementById('speed-label').textContent = '⚡ 超高速モード';
  else if (limit <= 2500) document.getElementById('speed-label').textContent = '🔥 高速モード';
  else document.getElementById('speed-label').textContent = '';
}

function handleAnswer(dir) {
  if (!gameActive || !currentAnswer) return;
  clearTimeout(questionTimeout);
  clearInterval(timerInterval);

  const reactionTime = performance.now() - startTime;
  totalReactionTime += reactionTime;
  total++;

  const isCorrect = dir === currentAnswer;
  const btn = document.getElementById('btn-' + dir);

  if (isCorrect) {
    correct++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    const speedBonus = Math.max(0, Math.floor((getTimeLimit() - reactionTime) / 50));
    const comboBonus = Math.min(combo * 5, 50);
    score += 10 + speedBonus + comboBonus;

    btn.classList.add('correct');
    showFlash('correct');
    playSE('correct');

    if (combo > 0 && combo % 5 === 0) { showComboPopup(`${combo}コンボ!`); playSE('combo'); }
    else if (combo === 3) { showComboPopup('🔥'); playSE('combo'); }
  } else {
    combo = 0;
    btn.classList.add('wrong');
    document.getElementById('btn-' + currentAnswer).classList.add('correct');
    showFlash('wrong');
    playSE('wrong');
    stopBGM();
    gameActive = false;
    currentAnswer = null;
    setTimeout(() => showResult(), 800);
    return;
  }

  currentAnswer = null;
  setTimeout(() => nextQuestion(), 300);
}

function onTimeout() {
  clearInterval(timerInterval);
  total++;
  combo = 0;
  showFlash('wrong');
  playSE('wrong');
  stopBGM();
  document.getElementById('btn-' + currentAnswer).classList.add('correct');
  gameActive = false;
  currentAnswer = null;
  setTimeout(() => showResult(), 800);
}

function showFlash(type) {
  const div = document.createElement('div');
  div.className = `flash-overlay flash-${type}`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 300);
}

function showComboPopup(text) {
  const div = document.createElement('div');
  div.className = 'combo-popup';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 800);
}

          <div class="rank-name">${escHtml(r.name)}</div>
          <div>
            <div class="rank-score">${r.score}pt</div>
            <div class="rank-date">${r.questions || '?'}問正解 | 🔥${r.combo || 0} | ${date}</div>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    console.error('Fetch ranking error:', e);
    list.innerHTML = '<div style="text-align:center;color:var(--accent);padding:40px">⚠️ 読み込みに失敗しました<br><small>ローカルランキングをご覧ください</small></div>';
  }
}

function showLocalRanking() {
  const rankings = getLocalRankings();
  const list = document.getElementById('ranking-list');
  if (rankings.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = rankings.map((r, i) => `
    <div class="ranking-item">
      <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : ''}">${i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</div>
      <div class="rank-name">${escHtml(r.name)}</div>
      <div>
        <div class="rank-score">${r.score}pt</div>
        <div class="rank-date">${r.correct || '?'}問正解 | ${r.date}</div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ========================================
// INPUT
// ========================================
document.querySelectorAll('.choice-btn').forEach(btn => {
  btn.addEventListener('click', () => handleAnswer(btn.dataset.dir));
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleAnswer(btn.dataset.dir);
  }, { passive: false });
});

document.addEventListener('keydown', (e) => {
  const map = {
    'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
    'w': 'up', 's': 'down', 'a': 'left', 'd': 'right',
    'W': 'up', 'S': 'down', 'A': 'left', 'D': 'right',
  };
  if (map[e.key] && gameActive) {
    e.preventDefault();
    handleAnswer(map[e.key]);
  }
  if (e.key === 'Enter' && document.getElementById('title-screen').classList.contains('active')) {
    startGame();
  }
});


function shareOnX() {
  initAudio();
  playSE('click');
  const name = document.getElementById('player-name').value.trim() || 'プレイヤー';
  const avgReaction = total > 0 ? (totalReactionTime / total / 1000).toFixed(2) : '---';
  const text = [
    '⚡ リフレックス・チャレンジ',
    '',
    '🏆 スコア: ' + score + 'pt',
    '✅ 正解数: ' + correct,
    '🔥 最大コンボ: ' + maxCombo,
    '⏱ 平均反応速度: ' + avgReaction + 's',
    '',
    'あなたも挑戦してみて！',
  ].join('\n');
  const url = 'https://hitokoto-dev.github.io/reflex-challenge-v2/';
  const tweetUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
  window.open(tweetUrl, '_blank');
}

// Init
showTitle();
</script>
